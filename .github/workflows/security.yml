name: Security audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly — catches newly-published RUSTSEC advisories in pinned deps.
    - cron: "17 4 * * 1"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: cargo-deny (advisories · licenses · bans · sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # Don't fail the whole job on advisory warnings for unmaintained
          # crates; do fail on vulnerabilities, license, ban, and source errors.
          arguments: --all-features

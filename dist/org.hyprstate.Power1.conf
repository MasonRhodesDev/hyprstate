<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- The own-allow MUST live only in the root policy: an own-allow in any
       user/group/default block would let a local user squat the name before
       the service starts and impersonate powerd (Type=dbus would even mark
       the unit as started). -->
  <policy user="root">
    <allow own="org.hyprstate.Power1"/>
  </policy>
  <policy group="wheel">
    <allow send_destination="org.hyprstate.Power1"/>
  </policy>
</busconfig>
